# Mihomo 订阅配置

# 软链接目标目录（config.yaml 创建在此目录）
output_dir: "/etc/mihomo"

# 配置模板路径
template: "./Mihomo-sync/template.yaml"

# 日志配置
log_file: "./Mihomo-sync/update.log"
log_level: "INFO"              # DEBUG, INFO, WARNING, ERROR, CRITICAL
max_log_size: "10MB"           # 日志文件最大大小，支持 B, KB, MB, GB

# 网络配置
retry: 3                       # 下载失败重试次数，默认 3 次
timeout: 30                    # 下载超时时间（秒），默认 30 秒

# 服务重启配置（可选）
restart_command: "systemctl restart mihomo"

subscriptions:
  # 主订阅
  - alias: "main"
    url: "https://example.com/sub?token=xxxxxx"
    auto_update: true
    interval: 6                # 每 6 小时更新一次

  # 备用订阅
  - alias: "backup"
    url: "https://example.com/sub?token=xxxxxx"
    auto_update: true
    interval: 12               # 每 12 小时更新一次

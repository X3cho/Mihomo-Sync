name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          make build-all VERSION=${{ steps.get_version.outputs.VERSION }}

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: build/mihomo-sync-*
          body: |
            ## 更新内容

            请查看 [CHANGELOG](https://github.com/${{ github.repository }}/releases) 获取详细信息。

            ## 文件说明

            - `mihomo-sync-linux-amd64` - Linux x64
            - `mihomo-sync-linux-arm64` - Linux ARM64
            - `mihomo-sync-darwin-amd64` - macOS x64
            - `mihomo-sync-darwin-arm64` - macOS ARM64 (M1/M2)
            - `mihomo-sync-windows-amd64.exe` - Windows x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
